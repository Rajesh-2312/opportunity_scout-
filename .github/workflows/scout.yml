name: Opportunity Scout — 24/7 Runner

on:
  schedule:
    # Runs every 6 hours: 12am, 6am, 12pm, 6pm IST (UTC+5:30 offset)
    - cron: '30 0,6,12,18 * * *'
  workflow_dispatch:   # lets you click "Run" manually from GitHub UI

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directories
        run: mkdir -p data reports leads

      - name: Write .env from GitHub Secrets
        run: |
          cat > .env << 'ENVEOF'
          NVIDIA_API_KEY=${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL=https://integrate.api.nvidia.com/v1
          NVIDIA_MODEL=meta/llama-3.1-8b-instruct
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_PAID_GROUP_ID=${{ secrets.TELEGRAM_PAID_GROUP_ID }}
          RAZORPAY_PAYMENT_LINK=https://razorpay.me/@marojurajesh
          TARGET_SECTORS=infrastructure,energy,ports,logistics,airports,green hydrogen,cement,data center
          TARGET_STATES=Andhra Pradesh,Telangana,Karnataka,Tamil Nadu,Maharashtra
          MIN_TENDER_VALUE_LAKHS=10
          SCAN_INTERVAL_HOURS=6
          AUTHOR_NAME=Rajesh M.
          NEWSLETTER_NAME=India Infra Intelligence
          SUBSTACK_URL=https://indiainfra.substack.com
          LINKEDIN_URL=https://linkedin.com/in/rajesh-maroju-754a65332
          DASHBOARD_PORT=8000
          ENVEOF

      - name: Restore subscriber database
        uses: actions/cache@v4
        with:
          path: data/subscribers.json
          key: subscribers-db-${{ github.ref }}
          restore-keys: subscribers-db-

      - name: Run renewal reminders + revenue summary
        run: python monetization/customer_pipeline.py check && python monetization/customer_pipeline.py summary
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run Opportunity Scout
        run: python main.py --full
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONUTF8: "1"

      - name: Save subscriber database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/subscribers.json
          key: subscribers-db-${{ github.ref }}-${{ github.run_number }}

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scout-reports-${{ github.run_number }}
          path: |
            reports/
            data/pipeline_results_*.json
            data/subscribers.json
          retention-days: 7
